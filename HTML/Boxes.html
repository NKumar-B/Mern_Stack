<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxes</title>
    <link rel="stylesheet" href="../CSS/flex.css">
</head>
<body>
    <div class="container">
        <div class="box" id="box">apple</div>
        <div class="box">banana</div>
        <div class="box">orange</div>
    </div>

    <div class="btn">
        <button id="Right" onmouseover="moveRight()">Right</button>
        <button id="Left" onclick="moveLeft()">Left</button>
        <button id="Up" onkeypress="moveUp()">Up</button>
        <!-- <button id="Down" onkeyup="moveDown()">Down</button> -->
        <!-- <button id="Down" ondblclick="moveDown()">Down</button> -->
        <!-- <button id="Down" onmousewheel="moveDown()">Down</button> -->
        <!-- <button id="Down" onkeydown="moveDown()">Down</button> -->
        <button id="Down" onmouseup="moveDown()">Down</button>
    </div>

    <script src="../JS/boxes.js"></script>
    
</body>
</html>
