<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="../CSS/position.css">
</head>
<body align="center">
    <div class="Data" id="Application">
        <header>
            <h1 id="Title"  >Forms</h1>
        </header>
        <main>
            <form>
                <label>Name:</label>
                <input id="Name" type="text" placeholder="Nithin kumar">
                <br><br>
                <label>Email:</label>
                <input id="Email" type="email" placeholder="nithinkumarbadduluri@gmail.com">
                <br><br>
                <label>Password:</label>
                <input  id="Password" type="password" placeholder="********">
                <br><br>
                <label>Phone no:</label>
                <input  id="Phone" type="tel" placeholder="1234567890">
                <br><br>
                <label>Gender:</label>
                <input type="radio" name="gender" id="1" value="Male">Male
                <input type="radio" name="gender" id="2" value="Female">Female
                <br><br>
                <label>Qualification:</label>
                <input type="checkbox" name="qualification" id="B.Tech" value="B.Tech">B.Tech
                <input type="checkbox" name="qualification" id="M.Tech" value="M.Tech">M.Tech
                <br><br>
                <label>Country:</label>
                <select id="Country" >
                    <option id="India" value="India">India</option>
                    <option id="USA" value="USA">USA</option>
                    <option id="UK" value="UK">UK</option>
                    <option id="Canada" value="Canada">Canada</option>
                </select>
                <br><br>
                <label>Date of birth:</label>
                <input id="Dateofbirth" type="datetime-local">
                <br><br>
                
                <label>Image:</label>
                <input id="Image" type="file">
                <br><br>
                <button onclick="show(event)" id="btn"  type="submit" >Submit</button>
            </form>

        </main>

        <div id="Result">
            
        </div>
        <footer>
            <!-- <p>© 2026 MERN Stack Application. All rights reserved.</p> -->
        </footer>
    </div>   
    
    <script src="/JS/script.js"></script>   
</body>
</html>
